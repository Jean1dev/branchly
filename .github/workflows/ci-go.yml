name: CI – Go

on:
  push:
    branches: [main, dev]
    paths:
      - "branchly-api/**"
      - "branchly-runner/**"
      - ".github/workflows/ci-go.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "branchly-api/**"
      - "branchly-runner/**"
      - ".github/workflows/ci-go.yml"

jobs:
  build-and-test:
    name: ${{ matrix.service }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: branchly-api
            dir: branchly-api
          - service: branchly-runner
            dir: branchly-runner

    defaults:
      run:
        working-directory: ${{ matrix.dir }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.dir }}/go.mod
          cache-dependency-path: ${{ matrix.dir }}/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -count=1 ./...
