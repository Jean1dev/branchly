name: CI – Web

on:
  push:
    branches: [main, dev]
    paths:
      - "branchly-web/**"
      - ".github/workflows/ci-web.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "branchly-web/**"
      - ".github/workflows/ci-web.yml"

jobs:
  ci:
    name: branchly-web
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: branchly-web

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: branchly-web/.nvmrc
          node-version: "22"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.18.2
          run_install: false

      - name: Get pnpm store path
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('branchly-web/pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          # next build needs these vars present at build time even if unused at runtime
          NEXTAUTH_SECRET: ci-placeholder
          NEXTAUTH_URL: http://localhost:3000
          API_URL: http://localhost:8080
          INTERNAL_API_SECRET: ci-placeholder
