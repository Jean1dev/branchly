name: CD – branchly-runner

on:
  push:
    branches: [main]
    paths:
      - "branchly-runner/**"
      - ".github/workflows/cd-runner.yml"

jobs:
  deploy:
    name: Build & deploy to Heroku
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Heroku Container Registry
        run: echo "${{ secrets.HEROKU_API_KEY }}" | docker login --username=_ --password-stdin registry.heroku.com

      - name: Build image
        run: docker build -t registry.heroku.com/branchly-runner/web ./branchly-runner

      - name: Push image
        run: docker push registry.heroku.com/branchly-runner/web

      - name: Release
        run: |
          IMAGE_ID=$(docker inspect registry.heroku.com/branchly-runner/web --format='{{.Id}}')
          curl -fsS -X PATCH https://api.heroku.com/apps/branchly-runner/formation \
            -H "Content-Type: application/json" \
            -H "Accept: application/vnd.heroku+json; version=3.docker-releases" \
            -H "Authorization: Bearer ${{ secrets.HEROKU_API_KEY }}" \
            -d "{\"updates\":[{\"type\":\"web\",\"docker_image\":\"${IMAGE_ID}\"}]}"
